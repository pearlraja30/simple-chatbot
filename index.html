<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaTech Policy Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, system-ui, sans-serif;
            background: #f4f7fb;
            color: #111;
        }

        .app-shell {
            max-width: 840px;
            margin: 0 auto;
            padding: 32px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            margin: 0 0 10px;
            font-size: 2rem;
        }

        header p {
            margin: 0;
            color: #555;
        }

        #messages {
            min-height: 320px;
            background: #fff;
            border: 1px solid #d8e1e8;
            border-radius: 16px;
            padding: 18px;
            overflow-y: auto;
        }

        .message {
            margin: 12px 0;
            padding: 14px 16px;
            border-radius: 14px;
            line-height: 1.6;
        }

        .user {
            background: #e8f0ff;
            color: #0b2d66;
            text-align: right;
        }

        .assistant {
            background: #f7f8fc;
            color: #111;
            text-align: left;
        }

        .sources {
            background: #fff8e6;
            color: #4d3d00;
            border: 1px solid #f1e1b8;
        }

        form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-top: 24px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #cfd8e4;
            font-size: 1rem;
        }

        button {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: progress;
        }

        .footer {
            margin-top: 32px;
            color: #556174;
            font-size: 0.95rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <header>
            <h1>NovaTech Policy Assistant</h1>
            <p>Ask questions about company policy documents. Powered by RAG and deployable on Vercel.</p>
        </header>

        <section id="messages"></section>

        <form id="chat-form">
            <input id="question" type="text" placeholder="Ask a policy question..." autocomplete="off" />
            <button id="send-button" type="submit">Send</button>
        </form>

        <div class="footer">Supports OpenAI or Groq. Set <code>OPENAI_API_KEY</code> or <code>GROQ_API_KEY</code> in
            Vercel environment variables.</div>
    </div>

    <script>
        const form = document.getElementById('chat-form');
        const questionInput = document.getElementById('question');
        const messages = document.getElementById('messages');
        const sendButton = document.getElementById('send-button');

        function addMessage(role, content) {
            const bubble = document.createElement('div');
            bubble.className = `message ${role}`;
            bubble.textContent = content;
            messages.appendChild(bubble);
            messages.scrollTop = messages.scrollHeight;
        }

        function setLoading(loading) {
            sendButton.disabled = loading;
            sendButton.textContent = loading ? 'Thinking...' : 'Send';
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            addMessage('user', question);
            questionInput.value = '';
            setLoading(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || response.statusText);
                }

                const data = await response.json();
                addMessage('assistant', data.answer);
                if (data.sources?.length) {
                    addMessage('sources', 'Sources:\n' + data.sources.join('\n'));
                }
            } catch (err) {
                addMessage('assistant', `Error: ${err.message}`);
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
